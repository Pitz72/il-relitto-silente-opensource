# BUILD CROSS-PLATFORM — Il Relitto Silente
# Compila .exe (Windows), .AppImage (Linux) e .dmg (macOS) e produce ZIP di
# distribuzione completi (eseguibile + documentazione).
#
# AVVIO ESCLUSIVAMENTE MANUALE: GitHub → Actions → "Build Cross-Platform Release"
# → "Run workflow". Nessun avvio automatico al push di tag o commit.
# La versione viene letta da package.json; se "create_release" è true il workflow
# pubblica anche una GitHub Release con tag vX.Y.Z (creato al momento del run).

name: Build Cross-Platform Release

on:
  workflow_dispatch:   # SOLO pulsante manuale su GitHub → Actions
    inputs:
      create_release:
        description: 'Pubblica anche una GitHub Release (tag vX.Y.Z da package.json)'
        type: boolean
        default: true

jobs:
  build:
    strategy:
      fail-fast: false   # Se un platform fallisce, gli altri continuano
      matrix:
        include:
          - os: windows-latest
            platform_flag: --win
            artifact_name: windows
            artifact_glob: release/*.exe
            zip_suffix: win
            exe_ext: exe

          - os: ubuntu-latest
            platform_flag: --linux
            artifact_name: linux
            artifact_glob: release/*.AppImage
            zip_suffix: linux
            exe_ext: AppImage

          - os: macos-latest
            platform_flag: --mac
            artifact_name: macos
            artifact_glob: release/*.dmg
            zip_suffix: mac
            exe_ext: dmg

    runs-on: ${{ matrix.os }}

    steps:
      # 1. Checkout del codice
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Legge la versione da package.json
      - name: Read version from package.json
        id: version
        shell: bash
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # 3. Setup Node.js (LTS 22)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 4. Dipendenze di sistema per Linux (AppImage builder)
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2-dev \
            fakeroot \
            rpm

      # 5. Installa le dipendenze npm
      - name: Install npm dependencies
        run: npm ci

      # 6. Build Vite (frontend React)
      - name: Build frontend (Vite)
        run: npm run build

      # 7. Compila il main process Electron (TypeScript → CommonJS)
      - name: Compile Electron main process
        run: npx tsc -p electron/tsconfig.json

      # 8. Genera dist-electron/package.json (richiesto da electron-builder)
      - name: Run build helper
        run: node electron/build-helper.js

      # 9. Pacchettizza con electron-builder per la piattaforma target
      - name: Package with electron-builder
        run: npx electron-builder ${{ matrix.platform_flag }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 10. Assembla ZIP di distribuzione (eseguibile + documentazione)
      - name: Assemble distribution ZIP
        shell: bash
        run: |
          set -e
          VERSION="${{ steps.version.outputs.VERSION }}"
          ZIP_SUFFIX="${{ matrix.zip_suffix }}"
          ZIP_NAME="IlRelittoSilente-${VERSION}-${ZIP_SUFFIX}.zip"
          STAGING="staging-${ZIP_SUFFIX}"

          echo "=== Contenuto di release/ ==="
          find release/ -maxdepth 2 -type f | sort

          mkdir -p "${STAGING}"

          # Trova e copia l'eseguibile prodotto da electron-builder
          EXE_PATH=$(find release/ -maxdepth 1 -type f -name "*.${{ matrix.exe_ext }}" | head -1)
          echo "=== Eseguibile trovato: ${EXE_PATH} ==="
          if [[ -z "${EXE_PATH}" ]]; then
            echo "ERRORE: nessun file .${{ matrix.exe_ext }} trovato in release/"
            exit 1
          fi
          cp "${EXE_PATH}" "${STAGING}/"

          # Copia la documentazione
          cp docs/giocatore/LEGGIMI.txt                     "${STAGING}/"
          cp docs/giocatore/MANUALE.md                      "${STAGING}/"
          cp docs/giocatore/SOLUZIONE.md                    "${STAGING}/"
          cp docs/giocatore/CARATTERISTICHE.txt             "${STAGING}/"
          cp docs/giocatore/il_relitto_silente_manuale.pdf  "${STAGING}/"

          echo "=== Contenuto staging ==="
          ls -lh "${STAGING}/"

          # Crea lo ZIP
          cd "${STAGING}"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            7z a "../${ZIP_NAME}" .
          else
            zip -r "../${ZIP_NAME}" .
          fi
          cd ..

          echo "=== ZIP prodotto ==="
          ls -lh "${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      # 11. Carica lo ZIP come artifact del workflow
      - name: Upload distribution ZIP
        uses: actions/upload-artifact@v4
        with:
          name: IlRelittoSilente-${{ matrix.artifact_name }}
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error
          retention-days: 30

  # ─── Release su GitHub (manuale) ────────────────────────────────────────
  # Si esegue solo se l'input "create_release" è true. La versione è letta da
  # package.json e il tag vX.Y.Z viene creato al momento del run sul commit
  # corrente (di norma master).
  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.create_release }}
    permissions:
      contents: write

    steps:
      # Checkout: serve a leggere la versione da package.json
      - name: Checkout repository
        uses: actions/checkout@v4

      # Legge la versione da package.json
      - name: Read version from package.json
        id: version
        run: echo "VERSION=$(node -e "process.stdout.write(require('./package.json').version)")" >> $GITHUB_OUTPUT

      # Scarica tutti gli artifact dai 3 job precedenti
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      # Elenca i file scaricati (utile per debug)
      - name: List artifacts
        run: find artifacts/ -type f | sort

      # Crea la GitHub Release (e il tag vX.Y.Z) e allega gli ZIP
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.VERSION }}"
          name: "Il Relitto Silente v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Il Relitto Silente v${{ steps.version.outputs.VERSION }}

            Avventura testuale fantascientifica ambientata su una nave aliena abbandonata.

            ---

            ### Download

            Ogni archivio contiene l'eseguibile e la documentazione completa (manuale PDF, istruzioni, soluzione).

            | Piattaforma | File |
            |---|---|
            | Windows | `IlRelittoSilente-${{ steps.version.outputs.VERSION }}-win.zip` |
            | Linux | `IlRelittoSilente-${{ steps.version.outputs.VERSION }}-linux.zip` |
            | macOS | `IlRelittoSilente-${{ steps.version.outputs.VERSION }}-mac.zip` |

            > **Nota macOS:** la build non è firmata con Apple Developer ID.
            > Se macOS blocca l'apertura: **tasto destro → Apri** e conferma.

            ---

            ### Documentazione inclusa negli archivi
            - `LEGGIMI.txt` — istruzioni rapide
            - `MANUALE.md` — guida completa ai comandi
            - `SOLUZIONE.md` — soluzione completa (spoiler)
            - `CARATTERISTICHE.txt` — caratteristiche tecniche
            - `il_relitto_silente_manuale.pdf` — manuale in formato PDF
          files: artifacts/**
          draft: false
          prerelease: false
